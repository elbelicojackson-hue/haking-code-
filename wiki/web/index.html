<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8">
<title>Haking Wiki</title>
<link rel="stylesheet" href="/style.css">
</head>
<body>
<div class="app">
  <header class="topbar">
    <div class="brand">HAKING WIKI <span class="sub">// knowledge graph</span></div>
    <div class="search-wrap">
      <input id="searchInput" placeholder="搜索节点... (Enter 跳转，Esc 清除)" autocomplete="off">
    </div>
    <div class="status disconnected" id="status">
      <span class="dot"></span><span id="statusText">disconnected</span>
    </div>
  </header>

  <aside class="left">
    <h3>Crawl URL</h3>
    <div class="crawl">
      <input id="crawlUrl" placeholder="https://...">
      <button id="crawlBtn">+ Add Page</button>
    </div>

    <h3>Legend</h3>
    <div class="legend" id="legend"></div>

    <div class="stats" id="stats">
      Nodes: <span id="nodeCount">0</span>　
      Edges: <span id="edgeCount">0</span>
    </div>
  </aside>

  <main class="canvas">
    <svg id="graphSvg"></svg>
    <div class="toast" id="toast"></div>
  </main>

  <aside class="right">
    <div class="head">
      <span class="ball" id="rightBall" style="background:#888"></span>
      <span class="title" id="rightTitle">— No node selected —</span>
      <span class="meta" id="rightMeta"></span>
      <a id="rightSource" href="#" target="_blank" rel="noopener" style="display:none">source ↗</a>
    </div>
    <div class="body" id="rightBody">
      <div class="empty">点击左侧图谱节点查看详情<br>或在上方搜索 / 添加 URL</div>
    </div>
    <div class="chat-section">
      <div class="chat-messages" id="chatMessages"></div>
      <div class="chat-input-wrap">
        <input id="chatInput" placeholder="问 Wiki AI 任何问题... (Enter 发送)" autocomplete="off">
        <button id="chatSend">→</button>
      </div>
    </div>
  </aside>
</div>

<script src="https://d3js.org/d3.v7.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script src="/graph.js"></script>
</body>
</html>
