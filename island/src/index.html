<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { background: transparent; overflow: hidden; font-family: 'Consolas', 'Courier New', monospace; user-select: none; }

.island {
  position: relative;
  border-radius: 16px;
  background: rgba(10, 10, 20, 0.88);
  backdrop-filter: blur(12px);
  padding: 2px;
  transition: height 0.3s cubic-bezier(0.34, 1.56, 0.64, 1), width 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
  width: 260px;
  height: 38px;
  overflow: hidden;
  margin: 0 auto;
}
.island.expanded { height: 280px; width: 280px; }

/* RGB 跑马灯边框 — 速度和亮度随 AI token rate 变化 */
.island::before {
  content: '';
  position: absolute;
  inset: 0;
  border-radius: 16px;
  padding: 2px;
  background: conic-gradient(from var(--angle, 0deg), #00fff7, #a855f7, #ff2d95, #00fff7);
  -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
  -webkit-mask-composite: xor;
  mask-composite: exclude;
  animation: rotate var(--spin-speed, 2s) linear infinite;
  opacity: var(--glow-intensity, 0.4);
  transition: opacity 0.3s ease;
}
@property --angle { syntax: '<angle>'; initial-value: 0deg; inherits: false; }
@keyframes rotate { to { --angle: 360deg; } }

/* Pulse glow behind the island when active */
.island::after {
  content: '';
  position: absolute;
  inset: -4px;
  border-radius: 20px;
  background: conic-gradient(from var(--angle, 0deg), #00fff7, #a855f7, #ff2d95, #00fff7);
  filter: blur(12px);
  opacity: var(--glow-outer, 0);
  animation: rotate var(--spin-speed, 2s) linear infinite;
  transition: opacity 0.5s ease;
  z-index: -1;
}

/* 内容区 */
.content { position: relative; z-index: 1; padding: 8px 12px; }

/* 收起状态 */
.header { display: flex; align-items: center; gap: 8px; font-size: 12px; }
.status-dot { width: 8px; height: 8px; border-radius: 50%; background: #00ff88; animation: pulse 2s infinite; }
@keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }
.title { color: #00fff7; font-weight: bold; font-size: 11px; }
.meta { color: #888; font-size: 10px; margin-left: auto; }

/* 展开内容 */
.body { margin-top: 8px; display: none; }
.island.expanded .body { display: block; }
.divider { height: 1px; background: linear-gradient(90deg, transparent, #a855f7, transparent); margin: 6px 0; }

/* Sessions */
.session { display: flex; align-items: center; gap: 6px; padding: 3px 6px; border-radius: 6px; font-size: 11px; color: #ccc; cursor: pointer; }
.session:hover { background: rgba(168, 85, 247, 0.15); }
.session .dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
.dot.running { background: #00ff88; }
.dot.idle { background: #555; }
.session-info { display: flex; flex-direction: column; overflow: hidden; flex: 1; }
.session-name { font-size: 11px; color: #ccc; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.session-detail { font-size: 9px; color: #666; white-space: nowrap; }

/* Tools 区 */
.section-label { font-size: 9px; color: #666; text-transform: uppercase; letter-spacing: 1px; margin: 4px 0 6px; display: flex; align-items: center; gap: 6px; }
.section-label .hint { margin-left: auto; color: #444; font-size: 9px; text-transform: none; letter-spacing: 0; }

.tools-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 6px;
}
.tool {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 5px 6px;
  border-radius: 8px;
  font-size: 10px;
  color: #ccc;
  cursor: pointer;
  background: rgba(255, 255, 255, 0.04);
  transition: background 0.15s, transform 0.1s;
  border: 1px solid transparent;
}
.tool:hover { background: rgba(255, 255, 255, 0.10); transform: translateY(-1px); }
.tool.selected {
  background: rgba(168, 85, 247, 0.18);
  border-color: rgba(168, 85, 247, 0.6);
}
.tool .ball {
  width: 10px;
  height: 10px;
  border-radius: 50%;
  flex-shrink: 0;
  box-shadow: 0 0 8px var(--c, #888);
  background: var(--c, #888);
}
.tool .name { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

/* Layout 区 */
.layout-row { display: flex; gap: 6px; margin-top: 4px; }
.layout-btn {
  flex: 1;
  text-align: center;
  padding: 5px 4px;
  border-radius: 6px;
  font-size: 10px;
  color: #aaa;
  cursor: pointer;
  background: rgba(255, 255, 255, 0.03);
  transition: background 0.15s, color 0.15s;
}
.layout-btn:hover { background: rgba(0, 255, 247, 0.12); color: #00fff7; }
.layout-btn.disabled { opacity: 0.3; pointer-events: none; }

.stats { display: flex; gap: 12px; font-size: 10px; color: #666; margin-top: 6px; align-items: center; }
.stats span { color: #00fff7; }
.wiki-btn { margin-left: auto; cursor: pointer; font-size: 14px; opacity: 0.7; transition: opacity 0.15s, transform 0.1s; }
.wiki-btn:hover { opacity: 1; transform: scale(1.2); }
.mic-btn { cursor: pointer; font-size: 14px; opacity: 0.7; transition: opacity 0.15s, transform 0.1s; }
.mic-btn:hover { opacity: 1; transform: scale(1.2); }
.mic-btn.recording { opacity: 1; animation: mic-pulse 0.6s ease-in-out infinite; }
@keyframes mic-pulse { 0%,100% { transform: scale(1); } 50% { transform: scale(1.3); } }

/* Voice waveform overlay */
.voice-overlay {
  position: absolute;
  inset: 0;
  border-radius: 16px;
  background: rgba(10, 10, 20, 0.95);
  display: none;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  z-index: 10;
  gap: 8px;
}
.voice-overlay.active { display: flex; }
.voice-overlay canvas { width: 200px; height: 60px; }
.voice-overlay .voice-hint { color: #888; font-size: 10px; }
.voice-overlay .voice-status { color: #00fff7; font-size: 11px; }

/* 关闭按钮 */
.close { position: absolute; top: 8px; right: 10px; color: #555; font-size: 12px; cursor: pointer; z-index: 2; display: none; }
.island.expanded .close { display: block; }
.close:hover { color: #ff2d95; }
</style>
</head>
<body>
<div class="island" id="island" data-tauri-drag-region>
  <div class="content">
    <div class="header" id="header" data-tauri-drag-region>
      <div class="status-dot"></div>
      <span class="title">HAKING</span>
      <span class="meta" id="meta">connecting...</span>
    </div>
    <div class="body">
      <div class="divider"></div>
      <div id="sessions"></div>

      <div class="section-label">
        TOOLS
        <span class="hint" id="toolsHint">click 启动 · shift+click 多选</span>
      </div>
      <div class="tools-grid" id="toolsGrid"></div>

      <div class="section-label">LAYOUT</div>
      <div class="layout-row">
        <div class="layout-btn disabled" data-layout="vertical"   id="lyV">▮▮ 左右</div>
        <div class="layout-btn disabled" data-layout="horizontal" id="lyH">≡ 上下</div>
        <div class="layout-btn disabled" data-layout="grid"       id="lyG">⊞ 田字</div>
        <div class="layout-btn disabled" data-layout="tabs"       id="lyT">▤ 多 Tab</div>
      </div>

      <div class="divider"></div>
      <div class="stats">
        <div>🧠 <span id="model">—</span></div>
        <div>📊 <span id="tokens">0</span> tok</div>
        <div>💰 <span id="cost">¥0</span></div>
        <div class="wiki-btn" id="wikiBtn" title="打开 Wiki 知识图谱">📚</div>
        <div class="mic-btn" id="micBtn" title="按住说话 · 松手发送">🎤</div>
      </div>
    </div>
    <div class="voice-overlay" id="voiceOverlay">
      <canvas id="waveCanvas" width="200" height="60"></canvas>
      <div class="voice-status" id="voiceStatus">松手发送</div>
      <div class="voice-hint">按住说话中...</div>
    </div>
  </div>
  <div class="close" id="closeBtn">✕</div>
</div>

<script>
const { invoke } = window.__TAURI__.core;
const island       = document.getElementById('island');
const meta         = document.getElementById('meta');
const sessionsEl   = document.getElementById('sessions');
const modelEl      = document.getElementById('model');
const tokensEl     = document.getElementById('tokens');
const costEl       = document.getElementById('cost');
const toolsGridEl  = document.getElementById('toolsGrid');
const toolsHint    = document.getElementById('toolsHint');
const layoutBtns   = [...document.querySelectorAll('.layout-btn')];

// Explicit drag handler — see capabilities/default.json for permission.
// data-tauri-drag-region is unreliable on transparent + decorations:false
// windows; calling startDragging() from mousedown is the stable path.
island.addEventListener('mousedown', async (e) => {
  if (e.button !== 0) return;
  if (e.target.closest('.session, .close, .tool, .layout-btn, .wiki-btn, .mic-btn')) return;
  try {
    await window.__TAURI__.window.getCurrentWindow().startDragging();
  } catch (err) {
    console.error('startDragging failed:', err);
  }
});

// Hover to expand, mouse-leave to collapse (like macOS Dynamic Island).
// Window stays 290x290 permanently (transparent area is invisible).
// Only CSS class toggles — no setSize needed.
let hoverTimer = null;
let leaveTimer = null;

island.addEventListener('mouseenter', () => {
  clearTimeout(leaveTimer);
  hoverTimer = setTimeout(() => {
    island.classList.add('expanded');
  }, 150);
});

island.addEventListener('mouseleave', () => {
  clearTimeout(hoverTimer);
  leaveTimer = setTimeout(() => {
    island.classList.remove('expanded');
  }, 350);
});

// Triple-click anywhere → close the process.
island.addEventListener('click', e => {
  if (e.target.closest('.session, .close, .tool, .layout-btn, .wiki-btn, .mic-btn')) return;
  if (e.detail >= 3) {
    window.__TAURI__.window.getCurrentWindow().close();
  }
});

document.getElementById('closeBtn').addEventListener('click', () => {
  window.__TAURI__.window.getCurrentWindow().close();
});

// Wiki button — open wiki in default browser
document.getElementById('wikiBtn').addEventListener('click', () => {
  invoke('open_wiki');
});

// ---------- Tools ----------
const selectedTools = new Set();   // ids selected for split launch
let toolsCache = [];

async function loadTools() {
  try {
    toolsCache = await invoke('list_tools');
  } catch (err) {
    console.error('list_tools failed:', err);
    toolsCache = [];
  }
  renderTools();
}

function renderTools() {
  toolsGridEl.innerHTML = toolsCache.map(t => `
    <div class="tool ${selectedTools.has(t.id) ? 'selected' : ''}" data-id="${t.id}" title="${t.name}: ${t.command} ${(t.args || []).join(' ')}">
      <div class="ball" style="--c: ${t.color || '#888'}"></div>
      <div class="name">${t.name}</div>
    </div>
  `).join('');
}

toolsGridEl.addEventListener('click', async e => {
  const el = e.target.closest('.tool');
  if (!el) return;
  const id = el.dataset.id;
  if (e.shiftKey) {
    // Multi-select for split launch
    if (selectedTools.has(id)) selectedTools.delete(id);
    else selectedTools.add(id);
    renderTools();
    updateLayoutButtons();
    return;
  }
  // Single-click: launch immediately
  try {
    await invoke('launch_tool', { id });
  } catch (err) {
    console.error('launch_tool failed:', err);
  }
});

function updateLayoutButtons() {
  const n = selectedTools.size;
  toolsHint.textContent = n > 0
    ? `${n} 个已选 · 点击 layout 启动`
    : 'click 启动 · shift+click 多选';
  layoutBtns.forEach(b => {
    if (n >= 2) b.classList.remove('disabled');
    else b.classList.add('disabled');
  });
}

layoutBtns.forEach(btn => {
  btn.addEventListener('click', async () => {
    if (btn.classList.contains('disabled')) return;
    const layout = btn.dataset.layout;
    const ids = [...selectedTools];
    if (ids.length < 2) return;
    try {
      await invoke('launch_split', { ids, layout });
      // Clear selection after successful launch.
      selectedTools.clear();
      renderTools();
      updateLayoutButtons();
    } catch (err) {
      console.error('launch_split failed:', err);
    }
  });
});

// ---------- Position persistence ----------
setInterval(async () => {
  try {
    const pos = await window.__TAURI__.window.getCurrentWindow().outerPosition();
    invoke('save_window_position', { x: pos.x, y: pos.y });
  } catch {}
}, 5000);

// ---------- WebSocket connection (token / cost / sessions) ----------
let ws;
function connect() {
  ws = new WebSocket('ws://127.0.0.1:7890');
  ws.onopen = () => { meta.textContent = 'connected'; };
  ws.onclose = () => { meta.textContent = 'disconnected'; setTimeout(connect, 3000); };
  ws.onmessage = e => {
    try { render(JSON.parse(e.data)); } catch {}
  };
}

// ---------- Token rate → border animation ----------
let lastTokenCount = 0;
let tokenRate = 0;  // tokens/sec (smoothed)

function updateBorderAnimation(currentTokens) {
  const delta = currentTokens - lastTokenCount;
  lastTokenCount = currentTokens;
  // Exponential moving average (α=0.3) for smooth transitions
  tokenRate = tokenRate * 0.7 + (delta > 0 ? delta : 0) * 0.3;

  // Map token rate to animation parameters:
  // 0 tok/s → slow spin (3s), dim (0.3), no outer glow
  // 50+ tok/s → fast spin (0.3s), bright (1.0), full outer glow
  const t = Math.min(tokenRate / 50, 1); // normalize 0-1
  const speed = (3 - t * 2.7).toFixed(2) + 's';      // 3s → 0.3s
  const intensity = (0.3 + t * 0.7).toFixed(2);       // 0.3 → 1.0
  const outer = (t * 0.35).toFixed(2);                 // 0 → 0.35

  island.style.setProperty('--spin-speed', speed);
  island.style.setProperty('--glow-intensity', intensity);
  island.style.setProperty('--glow-outer', outer);
}

function render(data) {
  const sessions = data.sessions || [];
  meta.textContent = `${sessions.length} session${sessions.length !== 1 ? 's' : ''}`;
  sessionsEl.innerHTML = sessions.map(s => {
    const tok = (s.totalTokens || 0).toLocaleString();
    const cost = '¥' + (s.totalCost || 0).toFixed(4);
    const model = s.model ? s.model.replace('deepseek-v4-', '') : '';
    return `
    <div class="session" onclick="focusSession('${s.id}')" title="双击跳转终端 · ${s.cwd || ''}">
      <div class="dot ${s.status}"></div>
      <div class="session-info">
        <span class="session-name">${s.name || s.id}</span>
        <span class="session-detail">${model} · ${tok} tok · ${cost}</span>
      </div>
    </div>`;
  }).join('');

  modelEl.textContent  = data.model || '—';
  tokensEl.textContent = (data.totalTokens || 0).toLocaleString();
  costEl.textContent   = '¥' + (data.totalCost || 0).toFixed(4);

  // Drive border animation from token delta
  updateBorderAnimation(data.totalTokens || 0);
}

window.focusSession = (id) => {
  invoke('focus_terminal_window', { sessionId: id });
};

loadTools();
connect();

// ---------- Voice Input (hold mic → record → release → Groq Whisper → send to Haking Code) ----------

const micBtn = document.getElementById('micBtn');
const voiceOverlay = document.getElementById('voiceOverlay');
const waveCanvas = document.getElementById('waveCanvas');
const voiceStatus = document.getElementById('voiceStatus');
const waveCtx = waveCanvas.getContext('2d');

let mediaRecorder = null;
let audioChunks = [];
let audioContext = null;
let analyser = null;
let animFrame = null;
let mediaStream = null;

function drawWaveform() {
  if (!analyser) return;
  const data = new Uint8Array(analyser.frequencyBinCount);
  analyser.getByteTimeDomainData(data);

  waveCtx.clearRect(0, 0, 200, 60);
  waveCtx.strokeStyle = '#00fff7';
  waveCtx.lineWidth = 2;
  waveCtx.shadowColor = '#00fff7';
  waveCtx.shadowBlur = 6;
  waveCtx.beginPath();

  const sliceWidth = 200 / data.length;
  let x = 0;
  for (let i = 0; i < data.length; i++) {
    const v = data[i] / 128.0;
    const y = (v * 60) / 2;
    if (i === 0) waveCtx.moveTo(x, y);
    else waveCtx.lineTo(x, y);
    x += sliceWidth;
  }
  waveCtx.lineTo(200, 30);
  waveCtx.stroke();
  animFrame = requestAnimationFrame(drawWaveform);
}

// Voice recording functions are defined below after SpeechRecognition detection

async function transcribeWithGroq(blob) {
  const groqKey = await getGroqKey();
  if (!groqKey) {
    meta.textContent = '✗ 需要 GROQ_API_KEY';
    setTimeout(() => { meta.textContent = 'connected'; }, 2000);
    return '';
  }

  const formData = new FormData();
  formData.append('file', blob, 'recording.webm');
  formData.append('model', 'whisper-large-v3-turbo');
  formData.append('response_format', 'json');

  const res = await fetch('https://api.groq.com/openai/v1/audio/transcriptions', {
    method: 'POST',
    headers: { 'Authorization': `Bearer ${groqKey}` },
    body: formData,
  });

  if (!res.ok) {
    const err = await res.text();
    throw new Error(`Groq ${res.status}: ${err}`);
  }
  const json = await res.json();
  return json.text || '';
}

// Get GROQ_API_KEY — try invoke from Tauri (reads env), fallback to prompt
let cachedGroqKey = null;
async function getGroqKey() {
  if (cachedGroqKey) return cachedGroqKey;
  // Try reading from the island WS state (hub broadcasts env-derived config)
  // For now, use localStorage as a simple persistence layer.
  cachedGroqKey = localStorage.getItem('groq_api_key');
  if (!cachedGroqKey) {
    cachedGroqKey = prompt('输入 Groq API Key (https://console.groq.com/keys):');
    if (cachedGroqKey) localStorage.setItem('groq_api_key', cachedGroqKey);
  }
  return cachedGroqKey;
}

// Hold to record, release to send
// Strategy: prefer native Web Speech API (local, free, realtime).
// Fallback to Groq Whisper if SpeechRecognition unavailable.
const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
let useNativeSpeech = !!SpeechRecognition;
let recognition = null;
let nativeResult = '';

if (useNativeSpeech) {
  recognition = new SpeechRecognition();
  recognition.continuous = true;
  recognition.interimResults = true;
  recognition.lang = 'zh-CN'; // 默认中文，也能识别英文混合
  recognition.onresult = (event) => {
    let transcript = '';
    for (let i = 0; i < event.results.length; i++) {
      transcript += event.results[i][0].transcript;
    }
    nativeResult = transcript;
    voiceStatus.textContent = transcript.slice(-30) || '听到了...';
  };
  recognition.onerror = (e) => {
    if (e.error === 'not-allowed') {
      voiceStatus.textContent = '麦克风权限被拒绝';
    }
  };
}

async function startRecording() {
  nativeResult = '';
  voiceOverlay.classList.add('active');
  micBtn.classList.add('recording');
  voiceStatus.textContent = '听到了...';

  if (useNativeSpeech) {
    // Native: start recognition + waveform visualization
    try {
      mediaStream = await navigator.mediaDevices.getUserMedia({ audio: true });
      audioContext = new AudioContext();
      const source = audioContext.createMediaStreamSource(mediaStream);
      analyser = audioContext.createAnalyser();
      analyser.fftSize = 256;
      source.connect(analyser);
      drawWaveform();
      recognition.start();
    } catch (err) {
      voiceStatus.textContent = '麦克风错误';
      console.error(err);
    }
  } else {
    // Fallback: Groq Whisper (record blob)
    try {
      mediaStream = await navigator.mediaDevices.getUserMedia({ audio: true });
      audioContext = new AudioContext();
      const source = audioContext.createMediaStreamSource(mediaStream);
      analyser = audioContext.createAnalyser();
      analyser.fftSize = 256;
      source.connect(analyser);

      mediaRecorder = new MediaRecorder(mediaStream, { mimeType: 'audio/webm' });
      audioChunks = [];
      mediaRecorder.ondataavailable = e => { if (e.data.size > 0) audioChunks.push(e.data); };
      mediaRecorder.start();
      drawWaveform();
    } catch (err) {
      voiceStatus.textContent = '麦克风权限被拒绝';
      console.error('mic error:', err);
    }
  }
}

async function stopRecording() {
  voiceOverlay.classList.remove('active');
  micBtn.classList.remove('recording');
  if (animFrame) { cancelAnimationFrame(animFrame); animFrame = null; }

  if (useNativeSpeech) {
    recognition.stop();
    mediaStream?.getTracks().forEach(t => t.stop());
    audioContext?.close();
    analyser = null;

    if (nativeResult.trim()) {
      await navigator.clipboard.writeText(nativeResult.trim());
      meta.textContent = '🎤 ' + nativeResult.trim().slice(0, 30) + (nativeResult.length > 30 ? '...' : '');
      setTimeout(() => { meta.textContent = 'connected'; }, 3000);
    }
    return;
  }

  // Groq fallback path
  if (!mediaRecorder || mediaRecorder.state === 'inactive') return;

  return new Promise(resolve => {
    mediaRecorder.onstop = async () => {
      mediaStream?.getTracks().forEach(t => t.stop());
      audioContext?.close();
      analyser = null;

      if (audioChunks.length === 0) { resolve(); return; }

      const blob = new Blob(audioChunks, { type: 'audio/webm' });
      voiceStatus.textContent = '转写中...';
      voiceOverlay.classList.add('active');

      try {
        const text = await transcribeWithGroq(blob);
        voiceOverlay.classList.remove('active');
        if (text && text.trim()) {
          await navigator.clipboard.writeText(text.trim());
          meta.textContent = '🎤 ' + text.trim().slice(0, 30) + (text.length > 30 ? '...' : '');
          setTimeout(() => { meta.textContent = 'connected'; }, 3000);
        }
      } catch (err) {
        voiceOverlay.classList.remove('active');
        console.error('transcribe error:', err);
        meta.textContent = '✗ 转写失败';
        setTimeout(() => { meta.textContent = 'connected'; }, 2000);
      }
      resolve();
    };
    mediaRecorder.stop();
  });
}

micBtn.addEventListener('mousedown', e => {
  if (e.button !== 0) return;
  e.preventDefault();
  startRecording();
});
micBtn.addEventListener('mouseup', () => stopRecording());
micBtn.addEventListener('mouseleave', () => {
  if (micBtn.classList.contains('recording')) stopRecording();
});
</script>
</body>
</html>
